<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Admin Login</title>
    <style>
      :root {
        --green: #2f7a4a;
        --blue: #1f5fa7;
        --text: #333333;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(47, 122, 74, 0.18), transparent 40%),
          radial-gradient(circle at 80% 20%, rgba(31, 95, 167, 0.2), transparent 45%),
          linear-gradient(135deg, #f7faf8, #eef3f8 55%, #f7f9fc);
        padding: 24px;
      }

      .login-card {
        width: min(460px, 100%);
        background: var(--white);
        border-radius: 18px;
        border: 1px solid #e6ebee;
        box-shadow: 0 24px 60px rgba(20, 41, 32, 0.14);
        overflow: hidden;
      }

      .login-header {
        padding: 22px 24px;
        color: var(--white);
        background: linear-gradient(90deg, var(--green), var(--blue));
      }

      .login-header h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 1.5rem);
      }

      .login-header p {
        margin: 8px 0 0;
        opacity: 0.95;
        font-size: 0.95rem;
      }

      .login-form {
        padding: 22px 24px 24px;
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.95rem;
        font-weight: 600;
      }

      input {
        width: 100%;
        height: 44px;
        border: 1px solid #cfd8dc;
        border-radius: 10px;
        padding: 0 12px;
        font-size: 0.98rem;
        outline: none;
      }

      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(31, 95, 167, 0.14);
      }

      button {
        margin-top: 4px;
        height: 46px;
        border: 0;
        border-radius: 10px;
        color: var(--white);
        font-size: 1rem;
        font-weight: 700;
        background: linear-gradient(90deg, var(--green), var(--blue));
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="login-card" aria-label="Login CMS Admin">
      <header class="login-header">
        <h1>CMS Admin Site</h1>
        <p>Accedi al pannello di amministrazione</p>
      </header>

      <form class="login-form" method="post" action="#">
        <label for="username">Nome Utente</label>
        <input id="username" name="username" type="text" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Accedi</button>
      </form>
    </main>
  </body>
</html>
