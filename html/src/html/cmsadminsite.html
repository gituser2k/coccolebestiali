<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Admin Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.tailwindcss.css" />
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.tailwindcss.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"></script>
    <style>
      :root {
        --green: #2f7a4a;
        --blue: #1f5fa7;
        --light: #f3f5f6;
        --text: #333333;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: var(--light);
        overflow: hidden;
      }

      .is-hidden {
        display: none !important;
      }

      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(47, 122, 74, 0.18), transparent 40%),
          radial-gradient(circle at 80% 20%, rgba(31, 95, 167, 0.2), transparent 45%),
          linear-gradient(135deg, #f7faf8, #eef3f8 55%, #f7f9fc);
      }

      .login-card {
        width: min(460px, 100%);
        background: var(--white);
        border-radius: 18px;
        border: 1px solid #e6ebee;
        box-shadow: 0 24px 60px rgba(20, 41, 32, 0.14);
        overflow: hidden;
      }

      .login-header {
        padding: 22px 24px;
        color: var(--white);
        background: linear-gradient(90deg, var(--green), var(--blue));
      }

      .login-header h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      .login-header p {
        margin: 8px 0 0;
        opacity: 0.95;
        font-size: 0.95rem;
      }

      .login-form {
        padding: 22px 24px 24px;
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .login-form input[type='text'],
      .login-form input[type='password'] {
        width: 100%;
        height: 44px;
        border: 1px solid #cfd8dc;
        border-radius: 10px;
        padding: 0 12px;
        font-size: 0.98rem;
        outline: none;
      }

      .login-form input[type='text']:focus,
      .login-form input[type='password']:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(31, 95, 167, 0.14);
      }

      button {
        margin-top: 4px;
        height: 46px;
        border: 0;
        border-radius: 10px;
        color: var(--white);
        font-size: 1rem;
        font-weight: 700;
        background: linear-gradient(90deg, var(--green), var(--blue));
        cursor: pointer;
      }

      .login-error {
        margin: 0;
        color: #b42318;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .dashboard-shell {
        height: 100vh;
        display: grid;
        grid-template-columns: 240px 1fr;
      }

      .sidenav {
        background: linear-gradient(180deg, var(--green), #245f3a 55%, var(--blue));
        color: var(--white);
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .sidenav h2 {
        margin: 0 0 18px;
        font-size: 1.05rem;
      }

      .menu-list {
        display: grid;
        gap: 0;
      }

      .menu-btn {
        width: 100%;
        border: 0;
        background: rgba(255, 255, 255, 0.08);
        color: var(--white);
        border-radius: 10px;
        padding: 12px 10px;
        margin-bottom: 10px;
        text-align: left;
        font-weight: 700;
        cursor: pointer;
      }

      .menu-btn.is-active {
        background: rgba(255, 255, 255, 0.24);
      }

      .logout-btn {
        margin-top: auto;
        background: rgba(0, 0, 0, 0.2);
      }

      .logout-btn:hover {
        background: rgba(0, 0, 0, 0.32);
      }

      .dashboard-main {
        padding: 22px;
        min-height: 0;
      }

      .panel {
        background: var(--white);
        border: 1px solid #e2e8ec;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        height: calc(100vh - 44px);
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        padding: 16px;
        border-bottom: 1px solid #ecf1f4;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .panel-header h3 {
        margin: 0;
      }

      .delete-errors-btn {
        margin-left: auto;
        height: 38px;
        padding: 0 14px;
        border: 0;
        border-radius: 8px;
        font-weight: 700;
        color: #ffffff;
        background: #b42318;
        cursor: pointer;
      }

      .delete-errors-btn:disabled {
        background: #d2d6db;
        cursor: not-allowed;
      }

      .row-contextmenu {
        position: fixed;
        z-index: 10000;
        min-width: 190px;
        background: #ffffff;
        border: 1px solid #d8dee3;
        border-radius: 10px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
        padding: 5px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .row-contextmenu button {
        width: 100%;
        height: 35px;
        margin-top: 0;
        border: 0;
        background: #f7fafc;
        border: 1px solid #e3e9ee;
        color: #25313b;
        text-align: left;
        padding: 4px 8px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.86rem;
        line-height: 1.15;
        font-weight: 700;
      }

      .row-contextmenu button:hover {
        background: #ecf3f9;
        border-color: #c8d9e7;
      }

      .reply-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 10020;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .reply-modal {
        width: min(680px, 100%);
        max-height: min(82vh, 700px);
        background: #ffffff;
        border: 1px solid #d8dee3;
        border-radius: 14px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .reply-modal-header {
        padding: 14px 16px;
        border-bottom: 1px solid #e7edf2;
        color: #ffffff;
        background: #1f5fa7;
        font-weight: 700;
      }

      .reply-modal-body {
        padding: 14px 16px;
        overflow: auto;
        display: grid;
        gap: 12px;
      }

      .reply-received-msg {
        padding: 10px;
        border: 1px solid #d8dee3;
        border-radius: 8px;
        max-height: 120px;
        overflow: auto;
        background: #f7fafb;
      }

      .reply-last-response {
        padding: 8px 10px;
        border: 1px solid #d8e9d6;
        border-radius: 8px;
        max-height: 86px;
        overflow: auto;
        background: #f3faf4;
        color: #234c2b;
        font-size: 0.9rem;
        line-height: 1.35;
      }

      .reply-input {
        width: 100%;
        min-height: 110px;
        max-height: 190px;
        resize: none;
        padding: 10px;
        border: 1px solid #cfd8dc;
        border-radius: 8px;
      }

      .reply-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(31, 95, 167, 0.14);
        outline: none;
      }

      .reply-modal-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        padding: 12px 16px 16px;
      }

      .reply-outcome {
        margin-right: auto;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .reply-outcome.success {
        color: #1b7f3b;
      }

      .reply-outcome.error {
        color: #b42318;
      }

      .reply-action {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
        color: #ffffff;
      }

      .reply-action.send {
        background: #1f5fa7;
      }

      .reply-action.close {
        background: #6b7780;
      }

      .app-loader {
        position: fixed;
        inset: 0;
        z-index: 10060;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(1px);
      }

      .app-loader-spinner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 4px solid #c9d8e7;
        border-top-color: var(--blue);
        animation: app-loader-spin 0.75s linear infinite;
      }

      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .table-wrap {
        overflow: hidden;
        padding: 16px;
        flex: 1;
        min-height: 0;
      }

      .services-admin {
        height: 100%;
        overflow: auto;
      }

      .services-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.95fr);
        gap: 18px;
        min-height: 100%;
      }

      .services-card {
        background: #f8fbfc;
        border: 1px solid #e2e8ec;
        border-radius: 14px;
        padding: 16px;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .services-card h4 {
        margin: 0;
        color: #1f3d52;
        font-size: 1rem;
      }

      .services-heading-green {
        color: var(--green) !important;
        font-weight: 800;
      }

      .services-heading-blue {
        color: var(--blue) !important;
        font-weight: 800;
      }

      .services-card p {
        margin: 0;
        color: #5b6b76;
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .service-form-grid {
        display: grid;
        gap: 12px;
      }

      .service-form-grid input,
      .service-form-grid textarea {
        width: 100%;
        border: 1px solid #ccd6dc;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.96rem;
        font-family: inherit;
        outline: none;
        background: #ffffff;
      }

      .service-form-grid textarea {
        resize: vertical;
        min-height: 110px;
      }

      .service-form-grid input:focus,
      .service-form-grid textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(31, 95, 167, 0.14);
      }

      .service-features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .service-feature-check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d9e4ea;
        background: #ffffff;
        font-size: 0.94rem;
        font-weight: 600;
      }

      .service-feature-check input {
        width: 18px;
        height: 18px;
        margin: 1px 0 0;
        accent-color: var(--blue);
      }

      .service-form-actions,
      .service-feature-actions,
      .service-row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .service-btn {
        margin-top: 0;
        height: 40px;
        padding: 0 14px;
        border-radius: 10px;
        font-size: 0.94rem;
      }

      .service-btn.secondary {
        background: #6b7780;
      }

      .service-btn.danger {
        background: #b42318;
      }

      .service-btn.light {
        background: linear-gradient(90deg, #eef5f9, #e6eef7);
        color: #1f3d52;
        border: 1px solid #d5e0e8;
      }

      .service-icon-btn {
        width: 40px;
        min-width: 40px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .service-icon-btn svg {
        width: 17px;
        height: 17px;
        display: block;
      }

      .services-list {
        display: grid;
        gap: 12px;
      }

      .services-divider {
        height: 1px;
        background: linear-gradient(90deg, rgba(31, 95, 167, 0.08), rgba(31, 95, 167, 0.24), rgba(47, 122, 74, 0.08));
        margin: 2px 0;
      }

      .service-row {
        border: 1px solid #dde7ec;
        border-radius: 12px;
        background: #ffffff;
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .service-row-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .service-row-title {
        margin: 0;
        color: #17394d;
        font-size: 1rem;
      }

      .service-row-desc {
        color: #4f616d;
        font-size: 0.93rem;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .service-badges,
      .feature-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .service-badge,
      .feature-badge {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #1f5fa7;
        background: rgba(31, 95, 167, 0.1);
        border: 1px solid rgba(31, 95, 167, 0.18);
      }

      .service-badge {
        gap: 8px;
        padding-right: 8px;
      }

      .service-badge-action {
        width: 22px;
        min-width: 22px;
        height: 22px;
        margin-top: 0;
        padding: 0;
        border-radius: 999px;
        border: 0;
        background: rgba(31, 95, 167, 0.14);
        color: #1f5fa7;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .service-badge-action:hover {
        background: rgba(180, 35, 24, 0.14);
        color: #b42318;
      }

      .feature-item {
        border: 1px solid #dde7ec;
        border-radius: 12px;
        background: #ffffff;
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .feature-item strong {
        color: #17394d;
      }

      .pettype-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .pettype-card {
        position: relative;
        min-height: 116px;
        align-items: flex-start;
        cursor: grab;
        user-select: none;
      }

      .pettype-card:active {
        cursor: grabbing;
      }

      .pettype-card.is-dragging {
        opacity: 0.58;
        transform: scale(0.985);
      }

      .pettype-card.is-drop-target {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(31, 95, 167, 0.12);
      }

      .pettype-card-main {
        display: grid;
        gap: 0;
        min-width: 0;
      }

      .pettype-order-chip {
        position: absolute;
        top: 10px;
        right: 10px;
        min-width: 28px;
        height: 28px;
        padding: 0 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(47, 122, 74, 0.14), rgba(31, 95, 167, 0.18));
        color: #17394d;
        font-size: 0.82rem;
        font-weight: 800;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .pettype-card .service-feature-actions {
        margin-top: auto;
      }

      .service-empty {
        padding: 18px 14px;
        border-radius: 12px;
        background: #ffffff;
        border: 1px dashed #cfd9df;
        color: #62727d;
        font-size: 0.94rem;
      }

      table {
        width: 100%;
        table-layout: fixed;
        min-width: 720px;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #eef2f5;
        text-align: left;
        vertical-align: top;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      thead th {
        background: #f7fafb;
        color: #1f3d52;
        font-size: 0.9rem;
      }

      .status-note {
        margin: 0;
        padding: 12px 16px;
        font-size: 0.92rem;
        color: #5e6b76;
      }

      .status-note:empty {
        display: none;
      }

      .dt-layout-row {
        margin-bottom: 8px !important;
        align-items: center;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
          height: auto;
        }

        .dashboard-shell {
          grid-template-columns: 1fr;
          height: auto;
        }

        .sidenav {
          display: flex;
          gap: 10px;
          align-items: center;
          flex-direction: row;
          padding: 12px;
        }

        .sidenav h2 {
          margin: 0 8px 0 0;
          font-size: 0.95rem;
          white-space: nowrap;
        }

        .menu-btn {
          margin: 0;
          width: auto;
          white-space: nowrap;
          padding: 10px 12px;
        }

        .menu-list {
          display: flex;
          gap: 10px;
        }

        .logout-btn {
          margin-top: 0;
          margin-left: auto;
        }

        .panel {
          height: auto;
        }

        .services-layout {
          grid-template-columns: 1fr;
        }

        .pettype-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <section id="loginShell" class="login-shell">
      <main class="login-card" aria-label="Login CMS Admin">
        <header class="login-header">
          <h1>CMS Admin Site</h1>
          <p>Accedi al pannello di amministrazione</p>
        </header>

        <form id="loginForm" class="login-form" method="post" action="#">
          <label for="username">Nome Utente</label>
          <input value="coccoadmin" id="username" name="username" type="text" autocomplete="username" style="padding-left: 10px;" required />

          <label for="password">Password</label>
          <input value="cocco123." id="password" name="password" type="password" autocomplete="current-password" style="padding-left: 10px;" required />

          <p id="loginError" class="login-error is-hidden">Credenziali non valide.</p>
          <button type="submit">Accedi</button>
        </form>
      </main>
    </section>

    <section id="dashboardShell" class="dashboard-shell is-hidden">
      <aside class="sidenav">
        <h2>CMS Admin</h2>
        <div class="menu-list">
          <button id="btnMessages" class="menu-btn is-active" type="button">Messaggi</button>
          <button id="btnErrors" class="menu-btn" type="button">Errori</button>
          <button id="btnServices" class="menu-btn" type="button">Servizi</button>
          <button id="btnPetTypes" class="menu-btn" type="button">Tipo di pet</button>
          <button id="btnHouseFeatures" class="menu-btn" type="button">Caratteristiche casa</button>
        </div>
        <button id="btnLogout" class="menu-btn logout-btn" type="button">Logout</button>
      </aside>

      <main class="dashboard-main">
        <div class="panel">
          <div class="panel-header">
            <h3 id="tableTitle">Messaggi</h3>
            <button id="btnDeleteErrors" class="delete-errors-btn is-hidden" type="button" disabled>ELIMINA</button>
          </div>
          <p id="statusNote" class="status-note">Caricamento dati...</p>
          <div class="table-wrap">
            <div id="servicesManager" class="services-admin is-hidden" aria-label="Gestione servizi"></div>
            <table id="dataTable" aria-label="Dati CMS">
              <colgroup id="dataCols"></colgroup>
              <thead id="dataHead"></thead>
              <tbody id="dataBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </section>

    <div id="rowContextMenu" class="row-contextmenu is-hidden" role="menu" aria-label="Azioni riga messaggio">
      <button id="ctxDeleteMessage" type="button">Elimina</button>
      <button id="ctxReplyMessage" type="button">Rispondi</button>
    </div>

    <div id="replyModalOverlay" class="reply-modal-overlay is-hidden" aria-hidden="true">
      <div class="reply-modal" role="dialog" aria-modal="true" aria-labelledby="replyModalTitle">
        <div id="replyModalTitle" class="reply-modal-header">Rispondi al messaggio</div>
        <div class="reply-modal-body">
          <div id="replyLastResponseWrap" class="is-hidden">
            <div style="font-weight:700;margin-bottom:6px;">Ultima risposta inviata</div>
            <div id="replyLastResponse" class="reply-last-response"></div>
          </div>
          <div>
            <div style="font-weight:700;margin-bottom:6px;">Messaggio ricevuto</div>
            <div id="replyReceivedMsg" class="reply-received-msg"></div>
          </div>
          <div id="replyInputWrap">
            <div style="font-weight:700;margin-bottom:6px;">Risposta</div>
            <textarea id="replyMessageText" class="reply-input" placeholder="Scrivi la risposta da inviare"></textarea>
          </div>
        </div>
        <div class="reply-modal-actions">
          <div id="replyOutcome" class="reply-outcome is-hidden" aria-live="polite"></div>
          <button id="replySendBtn" class="reply-action send" type="button">INVIA</button>
          <button id="replyCloseBtn" class="reply-action close" type="button">CHIUDI</button>
        </div>
      </div>
    </div>

    <div id="appLoader" class="app-loader is-hidden" aria-hidden="true" aria-label="Caricamento in corso">
      <div class="app-loader-spinner"></div>
    </div>

    <script type="module">
      import { showUtilityModal } from '/utility.js'
      window.CBUtility = { showUtilityModal }
    </script>
    <script>
      const ADMIN_USERNAME = 'coccoadmin'
      const ADMIN_PASSWORD = 'cocco123.'
      const LOGIN_SESSION_KEY = 'cms_admin_logged'

      const loginShell = document.getElementById('loginShell')
      const dashboardShell = document.getElementById('dashboardShell')
      const loginForm = document.getElementById('loginForm')
      const loginError = document.getElementById('loginError')

      const btnErrors = document.getElementById('btnErrors')

      async function fetchLastMessageReply(messageId) {
        const response = await laravelFetch(`/api/admin/messages/${messageId}/reply`, {
          headers: { Accept: 'application/json' },
        })

        if (!response.ok) {
          return null
        }

        const payload = await response.json()
        if (!payload?.ok) {
          return null
        }

        return payload?.data?.replymsg ?? null
      }

      async function openReplyModal(messageRow) {
        replyTargetMessage = messageRow
        shouldReloadMessagesOnReplyClose = false
        if ((messageRow.replymsg || '').trim()) {
          replyLastResponseWrap.classList.remove('is-hidden')
          replyLastResponse.textContent = messageRow.replymsg
          replySendBtn.classList.add('is-hidden')
          replyInputWrap.classList.add('is-hidden')
        } else {
          replyLastResponseWrap.classList.add('is-hidden')
          replyLastResponse.textContent = ''
          replySendBtn.classList.remove('is-hidden')
          replyInputWrap.classList.remove('is-hidden')
        }
        replyReceivedMsg.textContent = messageRow.msg || ''
        replyMessageText.value = ''
        replyOutcome.textContent = ''
        replyOutcome.classList.add('is-hidden')
        replyOutcome.classList.remove('success', 'error')
        replyModalOverlay.classList.remove('is-hidden')
        replyModalOverlay.setAttribute('aria-hidden', 'false')
        requestAnimationFrame(() => {
          replyMessageText.focus()
        })

        try {
          const latestReply = await fetchLastMessageReply(messageRow.id)
          if (latestReply && String(latestReply).trim()) {
            replyLastResponseWrap.classList.remove('is-hidden')
            replyLastResponse.textContent = String(latestReply)
            replyTargetMessage.replymsg = String(latestReply)
            messageRowsMap.set(replyTargetMessage.id, replyTargetMessage)
            replySendBtn.classList.add('is-hidden')
            replyInputWrap.classList.add('is-hidden')
          }
        } catch (error) {

        }
      }

      function getDynamicScrollY() {
        if (!panel) {
          return '260px'
        }

        const panelHeight = panel.clientHeight
        const headerHeight = panelHeader ? panelHeader.offsetHeight : 0
        const statusHeight = statusNote ? statusNote.offsetHeight : 0
        const reserveForPagination = 72
        const reserveForGaps = 32
        const available = panelHeight - headerHeight - statusHeight - reserveForPagination - reserveForGaps
        const scrollBodyHeight = Math.max(160, Math.floor(available))
        return `${scrollBodyHeight}px`
      }

      function syncDataTableLayout() {
        if (!dataTableInstance) {
          return
        }

        const container = dataTableInstance.table().container()
        const scrollBody = container.querySelector('.dt-scroll-body')
        const scrollHead = container.querySelector('.dt-scroll-head')
        const paging = container.querySelector('.dt-paging')
        const tableWrap = container.closest('.table-wrap')

        if (!scrollBody || !tableWrap) {
          return
        }

        const wrapStyle = window.getComputedStyle(tableWrap)
        const wrapPaddingTop = parseFloat(wrapStyle.paddingTop) || 0
        const wrapPaddingBottom = parseFloat(wrapStyle.paddingBottom) || 0
        const wrapInnerHeight = tableWrap.clientHeight - wrapPaddingTop - wrapPaddingBottom
        const scrollHeadHeight = scrollHead ? scrollHead.offsetHeight : 0
        const pagingHeight = paging ? paging.offsetHeight : 0
        const bodyHeight = Math.max(160, Math.floor(wrapInnerHeight - scrollHeadHeight - pagingHeight - 8))

        scrollBody.style.height = `${bodyHeight}px`
        scrollBody.style.maxHeight = `${bodyHeight}px`
        dataTableInstance.columns.adjust()
      }

          method: 'POST',
          headers: {

          body: JSON.stringify({ ids }),

      function reorderPetTypeRows(sourceId, targetId) {
        const sourceIndex = petTypeRows.findIndex((entry) => Number(entry.id) === Number(sourceId))
        const targetIndex = petTypeRows.findIndex((entry) => Number(entry.id) === Number(targetId))

        if (sourceIndex < 0 || targetIndex < 0 || sourceIndex === targetIndex) {
          return false
        }

        const nextRows = [...petTypeRows]
        const [moved] = nextRows.splice(sourceIndex, 1)
        nextRows.splice(targetIndex, 0, moved)

        petTypeRows = nextRows.map((entry, index) => ({
          ...entry,
          sortorder: (index + 1) * 10,
        }))

        return true
      }

      function reorderHouseFeatureRows(sourceId, targetId) {
        const sourceIndex = houseFeatureRows.findIndex((entry) => Number(entry.id) === Number(sourceId))
        const targetIndex = houseFeatureRows.findIndex((entry) => Number(entry.id) === Number(targetId))

      }

      function bindPetTypeDragEvents() {
        const cards = Array.from(document.querySelectorAll('.pettype-card'))
        if (!cards.length) {
          return
        }

        cards.forEach((card) => {
          card.addEventListener('dragstart', (event) => {
            draggedPetTypeId = Number(card.getAttribute('data-id'))
            card.classList.add('is-dragging')
            if (event.dataTransfer) {
              event.dataTransfer.effectAllowed = 'move'
              event.dataTransfer.setData('text/plain', String(draggedPetTypeId))
            }
          })

          card.addEventListener('dragend', () => {
            draggedPetTypeId = null
            cards.forEach((entry) => entry.classList.remove('is-dragging', 'is-drop-target'))
          })

          card.addEventListener('dragover', (event) => {
            event.preventDefault()
            if (draggedPetTypeId && Number(card.getAttribute('data-id')) !== draggedPetTypeId) {
              card.classList.add('is-drop-target')
            }
          })

          card.addEventListener('dragleave', () => {
            card.classList.remove('is-drop-target')
          })

          card.addEventListener('drop', async (event) => {
            event.preventDefault()
            card.classList.remove('is-drop-target')

            const targetId = Number(card.getAttribute('data-id'))
            const sourceId = draggedPetTypeId || Number(event.dataTransfer?.getData('text/plain') || 0)

            if (!sourceId || !targetId || sourceId === targetId) {
              return
            }

            const didReorder = reorderPetTypeRows(sourceId, targetId)
            if (!didReorder) {
              return
            }

            renderPetTypesManager()
            statusNote.textContent = 'Salvataggio nuovo ordine in corso...'

            try {
              await persistPetTypeOrder()
              statusNote.textContent = 'Ordine tipi di pet aggiornato correttamente.'
            } catch (error) {
              await loadPetTypesSection()
              statusNote.textContent = 'Errore durante il riordino dei tipi di pet.'
            }
          })
        })
      }

      function updateSelectAllErrorsCheckbox() {
        const selectAll = document.getElementById('selectAllErrors')
        if (!selectAll) {
          return
        }

        const rowChecks = Array.from(document.querySelectorAll('.error-row-check'))
        if (!rowChecks.length) {
          selectAll.checked = false
          selectAll.indeterminate = false
          return
        }

        const checkedCount = rowChecks.filter((entry) => entry.checked).length
        selectAll.checked = checkedCount === rowChecks.length
        selectAll.indeterminate = checkedCount > 0 && checkedCount < rowChecks.length
      }

      function syncSelectedErrorsUI() {
        document.querySelectorAll('.error-row-check').forEach((entry) => {
          const id = Number(entry.getAttribute('data-id'))
          entry.checked = selectedErrorIds.has(id)
        })
        updateSelectAllErrorsCheckbox()
        updateDeleteButtonState()
      }

      function updateSelectAllMessagesCheckbox() {
        const selectAll = document.getElementById('selectAllMessages')
        if (!selectAll) {
          return
        }

        const rowChecks = Array.from(document.querySelectorAll('.message-row-check'))
        if (!rowChecks.length) {

          return
        }

        const checkedCount = rowChecks.filter((entry) => entry.checked).length
        selectAll.checked = checkedCount === rowChecks.length

      }

      function syncSelectedMessagesUI() {
        document.querySelectorAll('.message-row-check').forEach((entry) => {
          const id = Number(entry.getAttribute('data-id'))
          entry.checked = selectedMessageIds.has(id)
        })
        updateSelectAllMessagesCheckbox()
      }

      function bindMessageSelectionEvents() {
        const selectAll = document.getElementById('selectAllMessages')
        if (selectAll) {
          selectAll.addEventListener('change', (event) => {
            const checked = Boolean(event.target.checked)
            document.querySelectorAll('.message-row-check').forEach((entry) => {
              const id = Number(entry.getAttribute('data-id'))
              entry.checked = checked

              if (checked) {
                selectedMessageIds.add(id)
              } else {
                selectedMessageIds.delete(id)
              }
            })
            updateSelectAllMessagesCheckbox()
          })
        }

        document.querySelectorAll('.message-row-check').forEach((entry) => {
          entry.addEventListener('change', (event) => {
            const id = Number(event.target.getAttribute('data-id'))
            if (event.target.checked) {
              selectedMessageIds.add(id)
            } else {
              selectedMessageIds.delete(id)
            }
            updateSelectAllMessagesCheckbox()
          })
        })

        syncSelectedMessagesUI()
      }

      function bindMessageContextMenuEvents() {
        document.querySelectorAll('#dataBody tr').forEach((row) => {
          row.addEventListener('contextmenu', (event) => {
            const check = row.querySelector('.message-row-check')
            if (!check) {
              return
            }

            event.preventDefault()
            const id = Number(check.getAttribute('data-id'))
            if (!check.checked) {
              check.checked = true
              selectedMessageIds.add(id)
              updateSelectAllMessagesCheckbox()
            }

            showRowContextMenu(event.clientX, event.clientY, id)
          })
        })
      }

      function initDataTable(customOptions = {}) {
        dataTableInstance = new DataTable('#dataTable', {
          pageLength: 10,
          lengthMenu: [10, 25, 50, 100],
          order: [[0, 'desc']],
          autoWidth: false,
          scrollY: getDynamicScrollY(),
          scrollCollapse: true,
          paging: true,
          searching: false,
          info: false,
          lengthChange: false,
          layout: {
            topStart: null,
            topEnd: null,
            bottomStart: null,
            bottomEnd: 'paging',
          },
          language: {
            search: 'Cerca:',
            lengthMenu: 'Mostra _MENU_ record',
            info: 'Visualizzati _START_ - _END_ di _TOTAL_ record',
            infoEmpty: 'Nessun record disponibile',
            zeroRecords: 'Nessun risultato trovato',
            emptyTable: 'Nessun record disponibile',
            paginate: {
              first: 'Prima',
              previous: 'Precedente',
              next: 'Successiva',
              last: 'Ultima',
            },
          },
          ...customOptions,
        })

        dataTableInstance.on('draw', () => {
          syncDataTableLayout()
          if (currentSection === 'messages') {
            bindMessageSelectionEvents()
            bindMessageContextMenuEvents()
          }
          if (currentSection === 'errors') {
            bindErrorSelectionEvents()
          }
        })

        requestAnimationFrame(() => {
          syncDataTableLayout()
          if (currentSection === 'messages') {
            bindMessageSelectionEvents()
            bindMessageContextMenuEvents()
          }
          if (currentSection === 'errors') {
            bindErrorSelectionEvents()
          }
        })
      }

      function renderTable(columns, rows, dtOptions = null, renderOptions = null) {
        destroyDataTable()
        dataCols.innerHTML = columns
          .map(() => `<col style="width:${Math.floor(100 / columns.length)}%;">`)
          .join('')

        const headerHtmlMap = renderOptions?.headerHtmlMap || {}
        const rawColumns = new Set(renderOptions?.rawColumns || [])
        const headHtml = `<tr>${columns
          .map((col) => `<th>${headerHtmlMap[col] ?? escapeHtml(col)}</th>`)
          .join('')}</tr>`
        dataHead.innerHTML = headHtml

        dataBody.innerHTML = rows
          .map((row) => {
            const cells = columns
              .map((column) => {
                if (rawColumns.has(column)) {
                  return `<td>${row[column] ?? ''}</td>`
                }

                return `<td>${escapeHtml(row[column])}</td>`
              })
              .join('')
            return `<tr>${cells}</tr>`
          })
          .join('')

        initDataTable(dtOptions ?? {})
      }

      async function loadMessages() {
        hideRowContextMenu()
        contextMessageId = null
        setDeleteButtonVisibility(false)
        selectedErrorIds.clear()
        updateDeleteButtonState()
        selectedMessageIds.clear()
        tableTitle.textContent = 'Messaggi'
        statusNote.textContent = 'Caricamento messaggi...'
        const response = await laravelFetch('/api/admin/messages', { headers: { Accept: 'application/json' } })

        if (!response.ok) {
          throw new Error('Errore caricamento messaggi')
        }

        const payload = await response.json()
        const rows = Array.isArray(payload.data) ? payload.data : []
        messageRowsMap.clear()
        const normalizedRows = rows.map((row) => {
          const id = Number(row.id)
          const hasReply = Boolean((row.replymsg ?? '').toString().trim())
          const emailValue = escapeHtml(row.email ?? '')
          const emailHtml = hasReply ? `<span style="color:#1b7f3b;font-weight:700;">${emailValue}</span>` : emailValue

          messageRowsMap.set(id, {
            id,
            email: row.email ?? '',
            msg: row.msg ?? '',
            replymsg: row.replymsg ?? '',
          })

          return {
            __select: `<input type="checkbox" class="message-row-check" data-id="${id}" aria-label="Seleziona riga messaggio ${id}">`,
            __email: emailHtml,
            ...row,
          }
        })

        renderTable(['__select', 'id', 'name', '__email', 'msg'], normalizedRows, {
          columnDefs: [
            { targets: 0, width: '4%', orderable: false },
            { targets: 1, width: '7%' },
            { targets: 2, width: '19%' },
            { targets: 3, width: '30%' },
            { targets: 4, width: '40%' },
          ],
        }, {
          rawColumns: ['__select', '__email'],
          headerHtmlMap: {
            __select: '<input id="selectAllMessages" type="checkbox" aria-label="Seleziona tutte le righe messaggi">',
            __email: 'email',
          },
        })
        statusNote.textContent = `Record trovati: ${rows.length}`
      }

          body: JSON.stringify({

            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            id: editingHouseFeatureId,
            name,
            sortorder: editingHouseFeatureId
              ? Number((houseFeatureRows.find((entry) => Number(entry.id) === Number(editingHouseFeatureId))?.sortorder) ?? 0)
              : ((houseFeatureRows.length + 1) * 10),
          }),
        })

        if (!response.ok) {
          throw new Error('Errore salvataggio caratteristica casa')
        }

        const payload = await response.json()
        if (!payload?.ok) {
          throw new Error('Salvataggio caratteristica casa non completato')
        }

        await loadHouseFeaturesSection()
        statusNote.textContent = isEditing ? 'Caratteristica casa aggiornata correttamente.' : 'Caratteristica casa creata correttamente.'
      }

      async function deleteHouseFeatureById(houseFeatureId) {
        const response = await laravelFetch(`/api/admin/house-features/${Number(houseFeatureId)}`, {
          method: 'DELETE',
          headers: {
            Accept: 'application/json',
          },
        })

        if (!response.ok) {
          throw new Error('Errore eliminazione caratteristica casa')
        }

        const payload = await response.json()
        if (!payload?.ok) {
          throw new Error('Eliminazione caratteristica casa non completata')
        }

        await loadHouseFeaturesSection()
        statusNote.textContent = 'Caratteristica casa eliminata correttamente.'
      }

      async function detachFeatureFromService(serviceId, featureId) {
        const response = await laravelFetch(`/api/admin/services/${Number(serviceId)}/features/${Number(featureId)}`, {
          method: 'DELETE',
          headers: {
            Accept: 'application/json',
          },
        })

        if (!response.ok) {
          throw new Error('Errore disabilitazione funzionalità nel servizio')
        }

        const payload = await response.json()
        if (!payload?.ok) {
          throw new Error('Disabilitazione funzionalità nel servizio non completata')
        }

        await loadServicesSection()
        statusNote.textContent = 'Funzionalità rimossa dal servizio correttamente.'
      }

      async function detachFeatureGlobally(featureId) {
        const response = await laravelFetch(`/api/admin/service-features/${Number(featureId)}/services`, {
          method: 'DELETE',
          headers: {
            Accept: 'application/json',
          },
        })

        if (!response.ok) {
          throw new Error('Errore disabilitazione globale funzionalità')
        }

        const payload = await response.json()
        if (!payload?.ok) {
          throw new Error('Disabilitazione globale funzionalità non completata')
        }

        await loadServicesSection()
        statusNote.textContent = 'Funzionalità disabilitata su tutti i servizi associati.'
      }

      async function deleteSelectedErrors() {
        const ids = Array.from(selectedErrorIds)
        if (ids.length === 0) {
          return
        }

        const response = await laravelFetch('/api/admin/errors', {
          method: 'DELETE',
          headers: {
            Accept: 'application/json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ ids }),
        })

        if (!response.ok) {
          throw new Error('Errore eliminazione righe selezionate')
        }

        const payload = await response.json()
        if (!payload?.ok) {
          throw new Error('Eliminazione non completata')
        }

        selectedErrorIds.clear()
        await loadErrors()
      }

      async function deleteSelectedMessages() {
        const ids = Array.from(selectedMessageIds)
        if (ids.length === 0) {
          return
        }

        const response = await laravelFetch('/api/admin/messages', {
          method: 'DELETE',
          headers: {
            Accept: 'application/json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ ids }),
        })

        if (!response.ok) {
          throw new Error('Errore eliminazione messaggi selezionati')
        }

        const payload = await response.json()
        if (!payload?.ok) {
          throw new Error('Eliminazione messaggi non completata')
        }

        selectedMessageIds.clear()
        await loadMessages()
      }

      function getCurrentContextMessage() {
        if (contextMessageId && messageRowsMap.has(contextMessageId)) {
          return messageRowsMap.get(contextMessageId)
        }

        const firstSelected = Array.from(selectedMessageIds)[0]
        if (firstSelected && messageRowsMap.has(firstSelected)) {
          return messageRowsMap.get(firstSelected)
        }

        return null
      }

      async function openReplyModalForContextMessage() {
        const current = getCurrentContextMessage()
        if (!current) {
          statusNote.textContent = 'Seleziona una riga messaggio prima di rispondere.'
          return
        }
        await openReplyModal(current)
      }

      async function showSection(section) {
        try {
          if (section === 'messages') {
            setActiveMenu('messages')
            showTableWrap()
            await loadMessages()
            return
          }

          if (section === 'services') {
            setActiveMenu('services')
            await loadServicesSection()
            return
          }

          if (section === 'pettypes') {
            setActiveMenu('pettypes')
            await loadPetTypesSection()
            return
          }

          if (section === 'housefeatures') {
            setActiveMenu('housefeatures')
            await loadHouseFeaturesSection()
            return
          }

          setActiveMenu('errors')
          showTableWrap()
          await loadErrors()
        } catch (error) {
          destroyDataTable()
          statusNote.textContent = 'Errore nel caricamento dei dati.'
          if (section === 'services') {
            showServicesWrap()
            servicesManager.innerHTML = '<div class="service-empty">Impossibile leggere i dati dal server.</div>'
          } else if (section === 'pettypes' || section === 'housefeatures') {
            showServicesWrap()
            servicesManager.innerHTML = '<div class="service-empty">Impossibile leggere i dati dal server.</div>'
          } else {
            showTableWrap()
            dataHead.innerHTML = ''
            dataBody.innerHTML = '<tr><td>Impossibile leggere i dati dal server.</td></tr>'
          }
        }
      }

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault()

        const username = document.getElementById('username').value.trim()
        const password = document.getElementById('password').value

        if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
          setLoginSession()
          await openDashboard()
          return
        }

        loginError.classList.remove('is-hidden')
      })

      btnMessages.addEventListener('click', async () => {
        await showSection('messages')
      })

      btnErrors.addEventListener('click', async () => {
        await showSection('errors')
      })

      btnServices.addEventListener('click', async () => {
        await showSection('services')
      })

      btnPetTypes.addEventListener('click', async () => {
        await showSection('pettypes')
      })

      btnHouseFeatures.addEventListener('click', async () => {
        await showSection('housefeatures')
      })

      btnLogout.addEventListener('click', () => {
        clearLoginSession()
        openLogin()
      })

      btnDeleteErrors.addEventListener('click', () => {
        const total = selectedErrorIds.size
        if (total === 0) {
          return
        }

        if (!window.CBUtility?.showUtilityModal) {
          return
        }

        window.CBUtility.showUtilityModal({
          testo_header: 'Eliminazione righe selezionate',
          body: 'Attenzione, si ' + (total == 1 ? "sta per eliminare la riga selezionata" : "stanno per eliminare <b>" + total + "</b> righe selezionate") + '. Procedere?',
          colorazione: 'warning',
          pulsanti: [
            {
              label: 'Si',
              callback: async ({ close }) => {
                try {
                  await deleteSelectedErrors()
                  statusNote.textContent = 'Righe eliminate correttamente.'
                  close()
                } catch (error) {
                  statusNote.textContent = 'Errore durante eliminazione righe.'
                  return false
                }
              },
            },
            {
              label: 'No',
              callback: ({ close }) => {
                close()
              },
            },
          ],
        })
      })

      ctxDeleteMessage.addEventListener('click', () => {
        hideRowContextMenu()
        const total = selectedMessageIds.size
        if (total === 0) {
          return
        }

        if (!window.CBUtility?.showUtilityModal) {
          return
        }

        window.CBUtility.showUtilityModal({
          testo_header: 'Eliminazione righe selezionate',
          body: 'Attenzione, si ' + (total === 1 ? 'sta per eliminare la riga selezionata' : 'stanno per eliminare <b>' + total + '</b> righe selezionate') + '. Procedere?',
          colorazione: 'warning',
          pulsanti: [
            {
              label: 'Si',
              callback: async ({ close }) => {
                try {
                  await deleteSelectedMessages()
                  statusNote.textContent = 'Righe eliminate correttamente.'
                  close()
                } catch (error) {
                  statusNote.textContent = 'Errore durante eliminazione righe.'
                  return false
                }
              },
            },
            {
              label: 'No',
              callback: ({ close }) => {
                close()
              },
            },
          ],
        })
      })

      ctxReplyMessage.addEventListener('click', async () => {
        hideRowContextMenu()
        await openReplyModalForContextMessage()
      })

      replySendBtn.addEventListener('click', async () => {
        if (!replyTargetMessage) {
          await closeReplyModal()
          return
        }

        const reply = replyMessageText.value.trim()
        if (!reply) {
          setReplyOutcome('Inserisci un testo di risposta.', true)
          return
        }

        try {
          const response = await laravelFetch('/api/admin/messages/reply', {
            method: 'POST',
            headers: {
              Accept: 'application/json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              messageid: replyTargetMessage.id,
              email: replyTargetMessage.email,
              reply,
            }),
          })

          if (!response.ok) {
            setReplyOutcome('Errore in fase di invio. Riprovare', true)
            return
          }

          const payload = await response.json()
          if (!payload?.ok) {
            setReplyOutcome('Errore in fase di invio. Riprovare', true)
            return
          }

          setReplyOutcome(`Risposta inviata a ${replyTargetMessage.email}.`, false)
          replyLastResponseWrap.classList.remove('is-hidden')
          replyLastResponse.textContent = reply
          replyTargetMessage.replymsg = reply
          messageRowsMap.set(replyTargetMessage.id, replyTargetMessage)
          replySendBtn.classList.add('is-hidden')
          replyInputWrap.classList.add('is-hidden')
          shouldReloadMessagesOnReplyClose = true
          statusNote.textContent = `Risposta inviata a ${replyTargetMessage.email}.`
        } catch (error) {
          setReplyOutcome('Errore in fase di invio. Riprovare', true)
        }
      })

      replyCloseBtn.addEventListener('click', async () => {
        await closeReplyModal()
      })

      servicesManager.addEventListener('click', async (event) => {
        const actionTarget = event.target.closest('[data-action]')
        if (!actionTarget) {
          return
        }

        const action = actionTarget.getAttribute('data-action')
        const id = Number(actionTarget.getAttribute('data-id'))

        try {
          if (action === 'save-service') {
            await saveCurrentService()
            return
          }

          if (action === 'reset-service') {
            resetServiceForm()
            return
          }

          if (action === 'edit-service') {
            populateServiceForm(id)
            return
          }

          if (action === 'delete-service') {
            if (!window.CBUtility?.showUtilityModal) {
              return
            }

            window.CBUtility.showUtilityModal({
              testo_header: 'Eliminazione servizio',
              body: `Attenzione, si sta per eliminare il servizio <b>#${id}</b>. Procedere?`,
              colorazione: 'warning',
              pulsanti: [
                {
                  label: 'Si',
                  callback: async ({ close }) => {
                    await deleteServiceById(id)
                    close()
                  },
                },
                {
                  label: 'No',
                  callback: ({ close }) => {
                    close()
                  },
                },
              ],
            })
            return
          }

          if (action === 'detach-feature-from-service') {
            if (!window.CBUtility?.showUtilityModal) {
              return
            }

            const serviceId = Number(actionTarget.getAttribute('data-service-id'))
            const featureId = Number(actionTarget.getAttribute('data-feature-id'))

            window.CBUtility.showUtilityModal({
              testo_header: 'Disabilitazione funzionalità',
              body: 'La funzionalità verrà rimossa dal singolo servizio e anche dalle attivazioni già salvate dai pet assistant per quel servizio. Procedere?',
              colorazione: 'warning',
              pulsanti: [
                {
                  label: 'Si',
                  callback: async ({ close }) => {
                    await detachFeatureFromService(serviceId, featureId)
                    close()
                  },
                },
                {
                  label: 'No',
                  callback: ({ close }) => {
                    close()
                  },
                },
              ],
            })
            return
          }

          if (action === 'save-feature') {
            await saveCurrentFeature()
            return
          }

          if (action === 'reset-feature') {
            resetFeatureForm()
            return
          }

          if (action === 'edit-feature') {
            populateFeatureForm(id)
            return
          }

          if (action === 'delete-feature') {
            if (!window.CBUtility?.showUtilityModal) {
              return
            }

            window.CBUtility.showUtilityModal({
              testo_header: 'Eliminazione funzionalità',
              body: `Attenzione, si sta per eliminare la funzionalità <b>#${id}</b> e le sue associazioni ai servizi. Procedere?`,
              colorazione: 'warning',
              pulsanti: [
                {
                  label: 'Si',
                  callback: async ({ close }) => {
                    await deleteFeatureById(id)
                    close()
                  },
                },
                {
                  label: 'No',
                  callback: ({ close }) => {
                    close()
                  },
                },
              ],
            })
            return
          }

          if (action === 'detach-feature-global') {
            if (!window.CBUtility?.showUtilityModal) {
              return
            }

            window.CBUtility.showUtilityModal({
              testo_header: 'Disabilitazione globale funzionalità',
              body: 'La funzionalità verrà rimossa da <b>tutti</b> i servizi a cui è associata e anche dalle attivazioni già salvate dai pet assistant. Procedere?',
              colorazione: 'warning',
              pulsanti: [
                {
                  label: 'Si',
                  callback: async ({ close }) => {
                    await detachFeatureGlobally(id)
                    close()
                  },
                },
                {
                  label: 'No',
                  callback: ({ close }) => {
                    close()
                  },
                },
              ],
            })
            return
          }

          if (action === 'save-pettype') {
            await saveCurrentPetType()
            return
          }

          if (action === 'reset-pettype') {
            resetPetTypeForm()
            return
          }

          if (action === 'edit-pettype') {
            populatePetTypeForm(id)
            return
          }

          if (action === 'delete-pettype') {
            if (!window.CBUtility?.showUtilityModal) {
              return
            }

            window.CBUtility.showUtilityModal({
              testo_header: 'Eliminazione tipo di pet',
              body: `Attenzione, si sta per eliminare il tipo di pet <b>#${id}</b> e le eventuali associazioni già salvate nei profili. Procedere?`,
              colorazione: 'warning',
              pulsanti: [
                {
                  label: 'Si',
                  callback: async ({ close }) => {
                    await deletePetTypeById(id)
                    close()
                  },
                },
                {
                  label: 'No',
                  callback: ({ close }) => {
                    close()
                  },
                },
              ],
            })
            return
          }

          if (action === 'save-housefeature') {
            await saveCurrentHouseFeature()
            return
          }

          if (action === 'reset-housefeature') {
            resetHouseFeatureForm()
            return
          }

          if (action === 'edit-housefeature') {
            populateHouseFeatureForm(id)
            return
          }

          if (action === 'delete-housefeature') {
            if (!window.CBUtility?.showUtilityModal) {
              return
            }

            window.CBUtility.showUtilityModal({
              testo_header: 'Eliminazione caratteristica casa',
              body: `Attenzione, si sta per eliminare la caratteristica casa <b>#${id}</b> e le eventuali associazioni già salvate nei profili. Procedere?`,
              colorazione: 'warning',
              pulsanti: [
                {
                  label: 'Si',
                  callback: async ({ close }) => {
                    await deleteHouseFeatureById(id)
                    close()
                  },
                },
                {
                  label: 'No',
                  callback: ({ close }) => {
                    close()
                  },
                },
              ],
            })
          }
        } catch (error) {
          statusNote.textContent = 'Operazione non completata. Verifica i dati e riprova.'
        }
      })

      window.addEventListener('resize', () => {
        requestAnimationFrame(() => {
          hideRowContextMenu()
          syncDataTableLayout()
        })
      })

      document.addEventListener('click', () => {
        hideRowContextMenu()
      })

      rowContextMenu.addEventListener('click', (event) => {
        event.stopPropagation()
      })

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          hideRowContextMenu()
          void closeReplyModal()
        }
      })

      replyModalOverlay.addEventListener('click', (event) => {
        if (event.target === replyModalOverlay) {
          void closeReplyModal()
        }
      })

      if (isLoginSessionActive()) {
        openDashboard()
      } else {
        openLogin()
      }
    </script>
  </body>
</html>
